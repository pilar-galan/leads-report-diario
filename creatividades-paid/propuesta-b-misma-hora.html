<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; }
  body { font-family: "Inter Variable", "Liberation Sans", sans-serif; }
  .canvas { position: relative; width: 1080px; height: 1350px; overflow: hidden; background: #131C29; }

  .visual { position: relative; width: 1080px; height: 1000px; }
  .pane { position: absolute; top: 0; height: 1000px; }
  .pane.left {
    left: 0; width: 1080px;
    background: linear-gradient(165deg, #1C2A3E 0%, #101a29 75%);
    clip-path: polygon(0 0, 640px 0, 440px 1000px, 0 1000px);
  }
  .pane.right {
    left: 0; width: 1080px;
    background: linear-gradient(165deg, #FFF8F2 0%, #FFE7DE 80%);
    clip-path: polygon(640px 0, 1080px 0, 1080px 1000px, 440px 1000px);
  }

  .chip {
    position: absolute; top: 44px; z-index: 5;
    font-size: 19px; font-weight: 700; letter-spacing: 3px;
    padding: 12px 26px; border-radius: 999px;
  }
  .chip.sin {
    left: 48px; color: #93A3BA;
    border: 2px solid rgba(255,255,255,.22);
    background: rgba(255,255,255,.05);
  }
  .chip.con {
    right: 48px; color: #fff; background: #FF5A5F;
    box-shadow: 0 10px 30px rgba(255,90,95,.45);
  }

  .stamp { position: absolute; z-index: 4; }
  .stamp .time { font-size: 112px; font-weight: 850; letter-spacing: -4px; }
  .stamp .cap { margin-top: 10px; font-size: 25px; font-weight: 600; line-height: 1.4; max-width: 380px; letter-spacing: -0.2px; }
  .stamp.left { left: 56px; top: 150px; }
  .stamp.left .time { color: #fff; }
  .stamp.left .cap { color: #8FA0B8; }
  .stamp.right { right: 56px; top: 150px; text-align: right; }
  .stamp.right .time { color: #18202B; }
  .stamp.right .cap { color: #8A6F62; margin-left: auto; }
  .stamp .cap b { color: #FF5A5F; font-weight: 800; }

  .scene { position: absolute; inset: 0; z-index: 3; }

  .band { position: absolute; left: 0; top: 1000px; width: 1080px; height: 350px; background: #131C29; padding: 56px 64px 0; }
  .headline { font-size: 56px; font-weight: 850; letter-spacing: -1.5px; line-height: 1.12; color: #fff; }
  .headline .accent { color: #FF5A5F; }
  .sub { margin-top: 16px; font-size: 24px; font-weight: 500; color: #8FA0B8; letter-spacing: -0.2px; }
  .bottom-row { position: absolute; left: 64px; right: 64px; bottom: 48px; display: flex; align-items: center; justify-content: space-between; }
  .cta {
    background: #FF5A5F; color: #fff; font-size: 24px; font-weight: 750;
    padding: 20px 46px; border-radius: 999px;
    box-shadow: 0 14px 35px rgba(255,90,95,.35);
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo .word { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
</style>
</head>
<body>
<div class="canvas">
  <div class="visual">
    <div class="pane left"></div>
    <div class="pane right"></div>

    <svg class="scene" viewBox="0 0 1080 1000">
      <!-- LEFT: airport bench, night -->
      <circle cx="280" cy="760" r="260" fill="rgba(255,255,255,0.035)"/>
      <text x="200" y="630" font-size="26" font-weight="800" font-style="italic" fill="rgba(255,255,255,0.28)" transform="rotate(-8 200 630)">z</text>
      <text x="233" y="592" font-size="36" font-weight="800" font-style="italic" fill="rgba(255,255,255,0.20)" transform="rotate(-8 233 592)">z</text>
      <text x="275" y="550" font-size="48" font-weight="800" font-style="italic" fill="rgba(255,255,255,0.13)" transform="rotate(-8 275 550)">z</text>

      <circle cx="152" cy="682" r="27" fill="#E9BD9C"/>
      <path d="M 125 676 A 27 27 0 0 1 179 676 Z" fill="#3D4E66"/>
      <rect x="164" y="662" width="190" height="54" rx="27" fill="#4A5B74"/>
      <rect x="334" y="670" width="90" height="40" rx="20" fill="#3E4E66"/>
      <rect x="104" y="718" width="350" height="24" rx="12" fill="#324158"/>
      <rect x="144" y="742" width="16" height="80" fill="#232F42"/>
      <rect x="398" y="742" width="16" height="80" fill="#232F42"/>

      <rect x="80" y="538" width="22" height="28" rx="7" fill="none" stroke="#C84B50" stroke-width="8"/>
      <rect x="55" y="556" width="72" height="112" rx="12" fill="#FF5A5F"/>
      <rect x="55" y="606" width="72" height="14" fill="rgba(0,0,0,0.14)"/>
      <circle cx="72" cy="672" r="7" fill="#18202B"/>
      <circle cx="110" cy="672" r="7" fill="#18202B"/>

      <line x1="50" y1="828" x2="450" y2="828" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>

      <!-- RIGHT: hotel, warm -->
      <circle cx="900" cy="640" r="240" fill="rgba(255,180,90,0.20)"/>
      <!-- window -->
      <rect x="660" y="450" width="170" height="214" rx="16" fill="#1E2B3D" stroke="#FFFFFF" stroke-width="11"/>
      <circle cx="784" cy="504" r="19" fill="#F4E9CF"/>
      <circle cx="700" cy="530" r="2.5" fill="rgba(255,255,255,0.5)"/>
      <circle cx="730" cy="490" r="2.5" fill="rgba(255,255,255,0.4)"/>
      <text x="695" y="620" font-size="23" fill="#8FA0B8" transform="rotate(-18 695 620)">&#9992;</text>

      <!-- bed -->
      <rect x="986" y="540" width="36" height="226" rx="13" fill="#B98A63"/>
      <ellipse cx="970" cy="648" rx="32" ry="40" fill="#FFFFFF"/>
      <circle cx="934" cy="582" r="26" fill="#E9BD9C"/>
      <path d="M 908 576 A 26 26 0 0 1 960 576 Z" fill="#3D4E66"/>
      <rect x="900" y="604" width="68" height="106" rx="30" fill="#4E8E96"/>
      <rect x="898" y="646" width="28" height="44" rx="8" fill="#18202B"/>
      <rect x="903" y="652" width="18" height="32" rx="4" fill="#BFE3FF"/>
      <rect x="742" y="700" width="282" height="66" rx="18" fill="#FFFFFF" stroke="#EADFD6" stroke-width="3"/>
      <path d="M 742 718 Q 756 700 786 700 L 900 700 Q 916 700 916 720 L 916 766 L 742 766 Z" fill="#FFD2CD"/>
      <rect x="718" y="766" width="18" height="56" rx="6" fill="#B98A63"/>
      <rect x="1000" y="766" width="18" height="56" rx="6" fill="#B98A63"/>

      <!-- suitcase made it -->
      <rect x="630" y="700" width="22" height="28" rx="7" fill="none" stroke="#C84B50" stroke-width="8"/>
      <rect x="605" y="718" width="72" height="112" rx="12" fill="#FF5A5F"/>
      <rect x="605" y="768" width="72" height="14" fill="rgba(0,0,0,0.10)"/>
      <circle cx="622" cy="834" r="7" fill="#18202B"/>
      <circle cx="660" cy="834" r="7" fill="#18202B"/>

      <line x1="640" y1="828" x2="1030" y2="828" stroke="rgba(120,80,50,0.15)" stroke-width="3"/>
    </svg>

    <div class="chip sin">SIN GURUSUP</div>
    <div class="chip con">CON GURUSUP</div>

    <div class="stamp left">
      <div class="time">23:47</div>
      <div class="cap">Tres horas esperando una respuesta de la aerolínea.</div>
    </div>
    <div class="stamp right">
      <div class="time">23:47</div>
      <div class="cap">Reubicado y en su hotel. Resuelto en <b>30 segundos</b>.</div>
    </div>
  </div>

  <div class="band">
    <div class="headline">La diferencia no es la suerte.<br><span class="accent">Es GuruSup.</span></div>
    <div class="sub">IA que resuelve el 95&nbsp;% de las incidencias de viaje al instante, en cualquier canal.</div>
    <div class="bottom-row">
      <div class="cta">Pruébalo gratis</div>
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 34 34">
          <circle cx="14" cy="13" r="9.5" fill="none" stroke="#FF5A5F" stroke-width="3.4"/>
          <path d="M 8 20 L 5.5 26 L 12.5 22.5" fill="none" stroke="#FF5A5F" stroke-width="3.4" stroke-linejoin="round"/>
          <circle cx="23.5" cy="21" r="7" fill="none" stroke="#FF5A5F" stroke-width="3.4"/>
          <path d="M 29 25.5 L 31 30 L 25.5 27.5" fill="none" stroke="#FF5A5F" stroke-width="3.4" stroke-linejoin="round"/>
        </svg>
        <span class="word">gurusup</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
