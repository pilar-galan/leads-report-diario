<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Seguimiento Semanal de Oportunidades — GuruSup</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0618;color:#e2e8f0;min-height:100vh}
  .header{background:linear-gradient(135deg,#0a0618 0%,#1a0f2e 100%);border-bottom:1px solid rgba(255,107,91,.2);padding:32px 40px;display:flex;justify-content:space-between;align-items:center}
  .header-left{display:flex;align-items:center;gap:16px}
  .logo{width:42px;height:42px}
  .header-title{font-size:22px;font-weight:700;color:#fff}
  .header-sub{font-size:13px;color:#94a3b8;margin-top:3px}
  .header-date .week{font-size:13px;color:#94a3b8}
  .header-date .dates{font-size:15px;font-weight:600;color:#FF6B5B}
  .container{max-width:1100px;margin:0 auto;padding:32px 24px}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
  .kpi-card{background:#1a0f2e;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px;position:relative;overflow:hidden}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
  .kpi-card.coral::before{background:#FF6B5B}.kpi-card.green::before{background:#22c55e}
  .kpi-card.red::before{background:#ef4444}.kpi-card.amber::before{background:#f59e0b}
  .kpi-card.blue::before{background:#3b82f6}
  .kpi-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
  .kpi-value{font-size:36px;font-weight:800;line-height:1}
  .kpi-value.coral{color:#FF6B5B}.kpi-value.green{color:#22c55e}
  .kpi-value.red{color:#ef4444}.kpi-value.amber{color:#f59e0b}.kpi-value.blue{color:#3b82f6}
  .kpi-sub{font-size:12px;color:#64748b;margin-top:6px}
  .kpi-pct{font-size:13px;font-weight:700;margin-top:10px;display:flex;align-items:center;gap:8px}
  .kpi-pct-bar{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
  .kpi-pct-fill{height:4px;border-radius:2px}
  .kpi-tag{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:700;margin-top:6px;display:inline-block}
  .section{margin-bottom:36px}
  .section-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:10px}
  .section-title span{display:inline-block;width:4px;height:18px;background:#FF6B5B;border-radius:2px}
  .card{background:#1a0f2e;border:1px solid rgba(255,255,255,.08);border-radius:12px;overflow:hidden}
  .sources-card{background:#1a0f2e;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:24px}
  .source-row{display:grid;grid-template-columns:230px 1fr 160px 52px;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.05)}
  .source-row:last-child{border-bottom:none}
  .source-name{display:flex;align-items:flex-start;gap:10px;font-size:13px}
  .source-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
  .source-count{font-size:11px;color:#64748b;margin-top:3px}
  .source-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .badge{font-size:12px;padding:4px 10px;border-radius:999px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
  .badge .pct{font-weight:400;opacity:.75;font-size:11px}
  .badge-green{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44}
  .badge-red{background:#ef444422;color:#ef4444;border:1px solid #ef444444}
  .badge-orange{background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b44}
  .source-bar-wrap{background:rgba(255,255,255,.06);border-radius:4px;height:6px}
  .source-bar{height:6px;border-radius:4px}
